<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donna — Drawing Canvas</title>
  <meta name="description" content="Hand-tracking writing canvas — draw with your fingers in the air." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-animated"></div>

  <main class="canvas-page">

    <!-- ─── Top Bar ─────────────────────────────────────────── -->
    <header class="topbar">
      <div class="logo-mini">Don<span>na</span></div>

      <!-- WebSocket status -->
      <div id="statusPill" class="status-pill disconnected" title="Python hand tracker connection status">
        <span class="status-dot"></span>
        <span id="statusText">Tracker Disconnected</span>
      </div>

      <div class="topbar-spacer"></div>

      <span class="topbar-user">Hello, <strong id="userName">…</strong></span>

      <!-- Undo -->
      <button class="icon-btn" id="undoBtn" title="Undo last stroke (Ctrl+Z)">
        ↩ Undo
      </button>

      <!-- Clear -->
      <button class="icon-btn danger" id="clearBtn" title="Clear canvas">
        🗑 Clear
      </button>

      <!-- Save & Download -->
      <button class="icon-btn save" id="saveBtn" title="Save to server and download as text">
        💾 Save & Download
      </button>

      <!-- Logout -->
      <button class="icon-btn danger" id="logoutBtn" title="Logout">
        ⎋ Logout
      </button>
    </header>

    <!-- ─── Canvas Area ──────────────────────────────────────── -->
    <div class="canvas-wrapper">
      <!-- Save notification -->
      <div class="save-notify" id="saveNotify">✓ Saved &amp; downloaded!</div>

      <!-- Main drawing canvas -->
      <canvas id="drawCanvas"></canvas>

      <!-- Webcam preview (bottom-right corner) -->
      <div class="webcam-preview">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="webcam-label">📷 Camera Preview</div>
      </div>

      <!-- Pinch status indicator -->
      <div class="pinch-indicator" id="pinchIndicator">
        ✋ Hold up your hand — pinch to draw
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/canvas.js"></script>
</body>
</html>
