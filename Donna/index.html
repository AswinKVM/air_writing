<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donna — Sign In</title>
  <meta name="description" content="Sign in to Donna, your AI-powered hand-tracking writing canvas." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-animated"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="auth-page">
    <div class="auth-card">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">✍️</div>
        <div class="logo-text">Don<span>na</span></div>
      </div>

      <!-- Heading -->
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">Sign in to access your hand-writing canvas</p>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          Sign In
        </button>

        <div id="toast" class="toast"></div>
      </form>

      <!-- Register link -->
      <div class="divider">or</div>
      <div style="text-align:center; font-size:0.88rem; color:var(--text-secondary)">
        Don't have an account?
        <button class="btn-link" onclick="location.href='register.html'">Create one</button>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
